<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Store</title>
    <link rel="stylesheet" href="./style3.css">
</head>
<body>

    <h1>Kho Game Của Tôi</h1>
    
    <div class="game-list">
        <div class="game-card" onclick="openGame(1)">
            <img src="https://placeholder.com" alt="Game 1">
            <h3>Liên Quân Mobile</h3>
        </div>
        <div class="game-card" onclick="openGame(2)">
            <img src="https://placeholder.com" alt="Game 2">
            <h3>PUBG Mobile</h3>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="game-details">
            </div>
        </div>
    </div>

    <script src="./detail.js"></script>
</body>
</html>
